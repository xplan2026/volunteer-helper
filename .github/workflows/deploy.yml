name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase env vars
        run: |
          SUPABASE_URL="$SUPABASE_URL"
          SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          echo "SUPABASE_URL 已配置: $(if [ -n "$SUPABASE_URL" ]; then echo '是'; else echo '否'; fi)"
          echo "SUPABASE_ANON_KEY 已配置: $(if [ -n "$SUPABASE_ANON_KEY" ]; then echo '是'; else echo '否'; fi)"
          if [ -z "$SUPABASE_URL" ] || [ "$SUPABASE_URL" = "" ]; then
            echo "⚠️ SUPABASE_URL secret 未配置，跳过注入（页面将回退 localStorage 模式）"
            echo "请前往 GitHub Settings > Secrets and variables > Actions 添加 SUPABASE_URL 和 SUPABASE_ANON_KEY"
          else
            echo "SUPABASE_URL length: ${#SUPABASE_URL}"
            sed -i "s@'__SUPABASE_URL__'@'${SUPABASE_URL}'@g" index.html
            sed -i "s@'__SUPABASE_ANON_KEY__'@'${SUPABASE_ANON_KEY}'@g" index.html
            # 验证替换结果
            if grep -q '__SUPABASE_URL__' index.html; then
              echo "❌ SUPABASE_URL 替换失败！"
              exit 1
            fi
            echo "✅ Supabase 环境变量已注入"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
